<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Nuevo Autor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body class="bg-light">

    <div class="container py-4">

      <!-- MUESTRA UN ERROR AL MOMENTO DE GUARDAR -->
      <h2 class="mb-4 text-center"
          th:text="${(autor != null and autor.id != null) ? 'Editar Autor' : 'Nuevo Autor'}">
      </h2>

      <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
      </div>

      <form th:object="${autor}" method="post"
            th:action="${autor.id != null} ? @{/autores/{id}(id=${autor.id})} : @{/autores}"
            class="needs-validation" novalidate>

        <div class="row">

          <!-- NOMBRE -->
          <div class="col-12 col-md-8 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text"
                   class="form-control"
                   th:field="*{nombre}"
                   placeholder="Ingrese nombre"
                   required>
            <div class="invalid-feedback">
              Este campo es obligatorio
            </div>
          </div> <!-- FIN NOMBRE -->

          <!-- NACIONALIDAD -->
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Nacionalidad</label>
            <input type="text"
                   class="form-control"
                   th:field="*{nacionalidad}"
                   placeholder="Ingrese nacionalidad"
                   required>
            <div class="invalid-feedback">
              Este campo es obligatorio
            </div>
          </div> <!-- FIN NACIONALIDAD -->

        </div>

        <!-- ESTADO -->
        <div class="row">

          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Estado</label>

            <select class="form-select" th:field="*{estado}" required>
              <option th:value="true">Activo</option>
              <option th:value="false">Inactivo</option>
            </select>

          </div>

        </div> <!-- FIN ESTADO -->

        <!-- BOTÓN -->
        <div class="row mt-3">

          <div class="col-12 col-md-3 mx-auto d-grid">
            <button type="submit" class="btn btn-primary">
              Guardar
            </button>
          </div>

        </div>

      </form>

      <!-- VOLVER -->
      <div class="text-center mt-3">
        <a th:href="@{/autores}" class="btn btn-secondary">Volver</a>
      </div>

    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {

        const forms = document.querySelectorAll('.needs-validation');

        forms.forEach(form => {
          form.addEventListener('submit', function (event) {

            if (!form.checkValidity()) {
              event.preventDefault(); // 🚫 bloquea envío
              event.stopPropagation();
            }

            form.classList.add('was-validated');

          });
        });

      });
    </script>
  </body>
</html>
