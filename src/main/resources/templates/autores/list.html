<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>Autores</title>

    <!-- RESPONSIVE obligatorio -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tus estilos después -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/autor.css}">
  </head>

  <body class="bg-light" style="font-size: 14px;">

    <div class="container mt-4">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Lista de Autores</h4>

        <div class="d-flex gap 1">
          <a th:href="${backendUrl + '/autores/pdf'}"
             target="_blank"
             class="btn btn-outline-primary">
            <i class="bi bi-file-earmark-pdf"></i>
          </a>

          <a th:href="@{/autores/nuevo}" class="btn btn-sm btn-success">
            <i class="bi bi-plus-lg"></i>
          </a>
        </div>
      </div>

      <!-- 🖥️ TABLA (solo escritorio) -->
      <div class="table-responsive">
        <table class="table table-sm table-striped table-hover align-middle tabla-autores">
          <thead class="table-dark">
            <tr>
              <th>Nombre</th>
              <th>ID</th>
              <th>Nacionalidad</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="autor : ${listaAutores}">
              <td data-label="Nombre" th:text="${autor.nombre}"></td>
              <td data-label="Id" th:text="${autor.id}"></td>
              <td data-label="Nacionalidad" th:text="${autor.nacionalidad}"></td>
              <td data-label="Estado" th:text="${autor.estado} ? 'Activo' : 'No activo'"></td>
              <td data-label="Acciones">
                <div class="d-flex gap-2">
                  <a th:href="@{'/autores/editar/' + ${autor.id}}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-pencil-square"></i>
                  </a>

                  <button 
                    class="btn btn-outline-danger btn-sm"
                    th:data-id="${autor.id}"
                    onclick="eliminarAutor(this)">
                    <i class="bi bi-trash3"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- BOTÓN VOLVER -->
    <div class="text-center mt-3">
      <a th:href="@{/}" class="btn btn-secondary btn-sm">← Menú</a>
    </div>

    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/app.js"></script>
    <script src="/js/autor.js"></script>

    <script th:if="${success}" th:inline="javascript">
                    Swal.fire({
                      icon: 'success',
                      title: 'Éxito',
                      text: [[${success}]],
                      timer: 1000,
                      showConfirmButton: false
                    });
    </script>

    <script th:if="${error}">
      Swal.fire({
        icon: 'error',
        title: 'Error',
        text: '[[${error}]]',
        timer: 1000,
        confirmButtonColor: '#d33'
      });
    </script>

  </body>
</html>
