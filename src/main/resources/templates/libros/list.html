<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>Libros</title>

    <!-- RESPONSIVE obligatorio -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tus estilos después -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/libro.css}">
  </head>

  <body class="bg-light">

    <div class="container py-3">

      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

        <h4 class="mb-0">Lista de Libros</h4>

        <div class="d-flex gap-1 flex-wrap">

          <!-- PDF general -->
          <a th:href="${backendUrl + '/libros/pdf'}"
             target="_blank"
             class="btn btn-sm btn-outline-danger">
            <i class="bi bi-file-earmark-pdf"></i>
          </a>

          <!-- Libros por autor -->
          <a th:href="${backendUrl + '/libros/pdf/libros-por-autor'}"
             target="_blank"
             class="btn btn-sm btn-outline-success">
            <i class="bi bi-people"></i>
          </a>

          <!-- Nuevo -->
          <a th:href="@{/libros/nuevo}"
             class="btn btn-sm btn-success">
            <i class="bi bi-plus-lg"></i>
          </a>

        </div>

      </div>


      <div class="row g-2 align-items-center mb-3">

        <!-- SELECT -->
        <div class="col-12 col-md-6">
          <select class="form-select dorm-select-sm" id="filtroAutor">
            <option value="">-- Filtrar por autor --</option>
            <option th:each="autor : ${listaAutores}"
                    th:value="${autor.id}"
                    th:text="${autor.nombre}"
                    th:selected="${autor.id} == ${autorSeleccionado}">
            </option>
          </select>
        </div>

        <!-- BOTÓN BUSCAR -->
        <div class="col-6 col-md-3">
          <button class="btn btn-primary btn-sm w-100" onclick="filtrarPorAutor()">
            Buscar
          </button>
        </div>

        <!-- BOTÓN RESET -->
        <div class="col-6 col-md-3">
          <a th:href="@{/libros}" class="btn btn-secondary w-100">
            Reset
          </a>
        </div>

      </div>

      <!-- 🖥️ TABLA (solo escritorio) -->
      <div class="table-responsive">
        <table class="table table-sm table-striped table-hover align-middle tabla-libros">
          <thead class="table-dark">
            <tr>
              <th>Título</th>
              <th>ID</th>
              <th>Estado</th>
              <th>Autor</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="libro : ${listaLibros}">
              <td data-label="Título" th:text="${libro.titulo}"></td>
              <td data-label="ID" th:text="${libro.id}"></td>
              <td data-label="Estado" th:text="${libro.estado} ? 'Activo' : 'No activo'"></td>
              <td data-label="Autor" th:text="${libro.autorNombre} ?: 'Sin autor'"></td>
              <td data-label="Acciones" >
                <div class="d-flex gap-1">
                  <a th:href="@{/libros/editar/{id}(id=${libro.id})}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-pencil-square"></i>
                  </a>

                  <button 
                    class="btn btn-outline-danger btn-sm"
                    th:data-id="${libro.id}"
                    onclick="eliminarLibro(this)">
                    <i class="bi bi-trash3"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- BOTÓN VOLVER -->
    <div class="text-center mt-3">
      <a th:href="@{/}" class="btn btn-secondary btn-sm">← menú</a>
    </div>

    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/app.js"></script>
    <script src="/js/libro.js"></script>

    <script th:if="${success}">
                    Swal.fire({
                      icon: 'success',
                      title: 'Éxito',
                      text: '[[${success}]]',
                      timer: 1000,
                      confirmButtonColor: '#3085d6'
                    });
    </script>

    <script th:if="${error}">
      Swal.fire({
        icon: 'error',
        title: 'Error',
        text: '[[${error}]]',
        timer: 1000,
        confirmButtonColor: '#d33'
      });
    </script>

  </body>
</html>
