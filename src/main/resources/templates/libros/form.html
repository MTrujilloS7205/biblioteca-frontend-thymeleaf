<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>Libro</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body class="bg-light">

    <div class="container py-4">

      <h2 class="mb-4 text-center"
          th:text="${(libro != null and libro.id != null) ? 'Editar Libro' : 'Nuevo Libro'}">
      </h2>

      <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
      </div>

      <form th:object="${libro}" method="post"
            th:action="${libro.id != null} 
            ? @{/libros/{id}(id=${libro.id})} 
            : @{/libros}"
            class="needs-validation" novalidate>

        <div class="row">

          <div class="row">
            <!-- TÍTULO -->
            <div class="col-12 col-md-6 mb-3">
              <label class="form-label">Título</label>
              <input type="text" class="form-control"
                     th:field="*{titulo}" required>
              <div class="invalid-feedback">
                El título es obligatorio
              </div>
            </div>

            <!-- ISBN -->
            <div class="col-12 col-md-6 mb-3">
              <label class="form-label">ISBN</label>
              <input type="text" class="form-control"
                     th:field="*{isbn}" required>
              <div class="invalid-feedback">
                El ISBN es obligatorio
              </div>
            </div>

          </div>

          <!-- FECHA -->
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">Fecha Publicación</label>
            <input type="date" class="form-control"
                   th:field="*{fechaPublicacion}"
                   th:attr="value=${#temporals.format(libro.fechaPublicacion, 'yyyy-MM-dd')}">
          </div>

          <!-- ESTADO -->
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select" th:field="*{estado}">
              <option th:value="true">Activo</option>
              <option th:value="false">Inactivo</option>
            </select>
          </div>

          <!-- AUTOR (temporal simple) -->
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">Autor</label>

            <select class="form-select"
                    th:field="*{autorId}" required>

              <option value="">Seleccione un autor</option>

              <option th:each="autor : ${listaAutores}"
                      th:value="${autor.id}"
                      th:text="${autor.nombre}">
              </option>

            </select>

            <div class="invalid-feedback">
              Debe seleccionar un autor
            </div>
          </div>

        </div>

        <div class="row mt-3">
          <div class="col-12 col-md-3 mx-auto d-grid">
            <button type="submit" class="btn btn-primary">
              Guardar
            </button>
          </div>
        </div>

      </form>

      <div class="text-center mt-3">
        <a th:href="@{/libros}" class="btn btn-secondary">Volver</a>
      </div>

    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {

        const forms = document.querySelectorAll('.needs-validation');

        forms.forEach(form => {
          form.addEventListener('submit', function (event) {

            if (!form.checkValidity()) {
              event.preventDefault();
              event.stopPropagation();
            }

            form.classList.add('was-validated');

          });
        });
      });
    </script>
  </body>
</html>
